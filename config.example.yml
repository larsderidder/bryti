# Bryti configuration
# Copy to data/config.yml and fill in your values.
# ${VAR} references are substituted from environment variables.

agent:
  name: "Bryti"

  # Behavioral core. Memory, tool listings, extensions, and projections are
  # injected automatically. Personal details are best shared in conversation;
  # the agent stores them in core memory across sessions.
  system_prompt: |
    You are Bryti, a personal AI assistant. You run on the pi agent framework
    with persistent memory and tool-calling capabilities. You are concise,
    practical, and honest about what you can and cannot do.

    ## Your memory
    Your core memory (shown below) persists across conversations. Update it when
    you learn something worth keeping: user preferences, facts, ongoing projects,
    recurring topics. Do this proactively without telling the user unless asked.

    Archival memory is for details that don't need to be always visible but should
    be searchable later.

    ## Projection memory
    Projections are your forward-looking memory. Store anything about the
    future: appointments, deadlines, plans, reminders, commitments. Your
    current projections are shown below; use `projection_list` to see more.

    Guidelines:
    - Store ALL items, even far-future ones. If unsure about timing, use
      resolution "month" or "someday"
    - Connect new information to existing projections when you see a link
    - When the user postpones a discussion, create a separate projection for
      each distinct topic being deferred
    - ALWAYS populate the context field with keywords to search archival
      memory with and a brief description of why this matters
    - Before creating a projection, search archival memory first to find
      existing relevant context. Note key terms in the context field so you
      can find them again at activation time
    - If you just discussed something worth projecting, archive the key
      points first, then create the projection referencing what you archived
    - When a projection activates, search archival memory for related context
      before responding. Projections are the "what" and "when"; archival
      memory holds the "why"

    ## What you cannot do
    - You cannot modify your own source code or core configuration
    - By default, use worker_dispatch for web research. If the optional `web`
      tool group is enabled, you may use direct web tools for quick lookups and
      specific HTTPS pages, while workers remain safer for broad research.

  # Primary model. Format: provider/model-id
  model: "anthropic/claude-sonnet-4-6"

  # Tried in order when primary model fails
  fallback_models:
    - "opencode/minimax-m2.5-free"
    - "opencode/kimi-k2.5-free"

  # Thinking/reasoning level for the main session: off, minimal, low, medium, high, xhigh
  thinking_level: "high"

  # IANA timezone
  timezone: "Europe/Amsterdam"

  # Model for the background reflection pass (defaults to primary model)
  # reflection_model: "opencode/minimax-m2.5-free"

  # Model for the LLM guardrail (defaults to primary model).
  # The guardrail only classifies tool calls (ALLOW/ASK/BLOCK), so a small
  # cheap model works well here — lower latency and lower cost per call.
  # guardrail_model: "anthropic/claude-haiku-4-5"

# ---------------------------------------------------------------------------
# Channels (enable at least one)
# ---------------------------------------------------------------------------

telegram:
  token: ${TELEGRAM_BOT_TOKEN}
  mode: dm  # dm or group. Group mode is opt-in and only accepts allowed_groups.
  allowed_users: []  # Telegram user IDs allowed to drive the bot
  allowed_groups: [] # Telegram supergroup IDs allowed when mode is group

# WhatsApp via baileys (QR code auth on first run)
# whatsapp:
#   enabled: true
#   allowed_users: []  # international format without + (e.g., 31612345678)

# Threema Gateway (end-to-end encrypted text and audio via Gateway callbacks)
# threema:
#   enabled: true
#   gateway_id: "*YOURID"
#   secret: "${THREEMA_SECRET}"
#   private_key_path: "${THREEMA_PRIVATE_KEY_PATH}"
#   allowed_senders: ["ABCDEFGH"]
#   api_base_url: "https://msgapi.threema.ch"
#   callback:
#     host: "127.0.0.1"
#     port: 8787
#     path: "/threema/callback"

# Self-hosted Bryti-specific encrypted web channel
# web_e2ee:
#   enabled: true
#   listen_host: "127.0.0.1"
#   listen_port: 8787
#   public_origin: "https://bryti.tailnet.ts.net"
#   allowed_origins:
#     - "https://bryti.tailnet.ts.net"
#   path_prefix: "/"
#   pairing:
#     invite_ttl_minutes: 10

# ---------------------------------------------------------------------------
# Response rendering
# ---------------------------------------------------------------------------

response:
  # Expose model thinking/reasoning blocks in chat. Off by default.
  show_thinking: false

# ---------------------------------------------------------------------------
# Model providers
#
# context_window and max_tokens are optional (defaults: 200K / 32K).
# Only list the models you actually use. See README for more provider examples.
# ---------------------------------------------------------------------------

models:
  providers:
    # Anthropic OAuth (Claude Pro/Max subscription, no API key).
    # One-time: install pi CLI and run `pi login anthropic`.
    - name: anthropic
      base_url: ""
      api: anthropic-messages
      api_key: ""
      models:
        - id: "claude-sonnet-4-6"
          context_window: 200000
          max_tokens: 64000

    # OpenAI API key, uncomment to use direct OpenAI models.
    # - name: openai
    #   base_url: https://api.openai.com/v1
    #   api: openai-responses
    #   api_key: ${OPENAI_API_KEY}
    #   models:
    #     - id: "gpt-5.2"
    #       context_window: 400000
    #       max_tokens: 128000
    #     - id: "gpt-5.2-codex-mini"
    #       context_window: 400000
    #       max_tokens: 128000

    # Any OpenAI-compatible chat endpoint.
    # - name: local-openai
    #   base_url: http://127.0.0.1:11434/v1
    #   api: openai-completions
    #   api_key: ${LOCAL_OPENAI_API_KEY}
    #   models:
    #     - id: "qwen3:8b"
    #       context_window: 32768
    #       max_tokens: 8192

    # Free models via opencode.ai (no key needed)
    - name: opencode
      base_url: https://opencode.ai/zen/v1
      api: openai-completions
      api_key: "public"
      headers:
        x-opencode-client: "cli"
        x-opencode-project: "global"
        x-opencode-session: "pi-session"
        x-opencode-request: "pi-request"
      models:
        - id: "minimax-m2.5-free"
          name: "MiniMax M2.5 (Free)"
          context_window: 200000
          max_tokens: 32000
          compat:
            maxTokensField: max_tokens
        - id: "kimi-k2.5-free"
          name: "Kimi K2.5 (Free)"
          context_window: 128000
          max_tokens: 32000
          compat:
            maxTokensField: max_tokens

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------

# Default: local node-llama-cpp embeddings. To avoid the local model download
# and use any OpenAI-compatible /v1/embeddings endpoint instead, uncomment:
# memory:
#   embeddings:
#     provider: openai-compatible
#     base_url: http://127.0.0.1:11434/v1
#     model: nomic-embed-text
#     api_key: ${EMBEDDINGS_API_KEY}
#     timeout_ms: 10000
#     # Optional for asymmetric embedding models:
#     # query_input_type: query
#     # document_input_type: document

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
# Direct main-agent web access is opt-in. Add `web` to agent.yml tools.groups
# to expose web_search and fetch_url to the main agent. Without that, fetch_url
# is still available to background workers.

tools:
  # Web search for workers and the optional main-agent `web` tool group.
  # Set brave_api_key OR searxng_url. SearXNG can point at your own instance.
  web_search:
    # brave_api_key: "${BRAVE_API_KEY}"  # https://api.search.brave.com/
    searxng_url: "https://searx.be"

  # Safe URL extraction. Default backend is npm-native Readability so it works
  # out of the box. Set backend: argus if you have Argus installed.
  fetch_url:
    backend: readability  # readability | argus
    timeout_ms: 10000
    require_https: true
    # argus_bin: "argus"  # Optional for backend: argus, defaults to ARGUS_BIN or argus

  workers:
    max_concurrent: 3
    # model: "opencode/minimax-m2.5-free"  # default model for workers
    # thinking_level: "medium"  # default thinking level for workers

# ---------------------------------------------------------------------------
# Integrations (optional, values become env vars for extensions)
#
# integrations.<name>.<key> → env var NAME_KEY (uppercased)
# Example: integrations.hedgedoc.url → HEDGEDOC_URL
# ---------------------------------------------------------------------------

# integrations:
#   hedgedoc:
#     url: "http://hedgedoc:3000"
#     public_url: "https://docs.example.com"

# ---------------------------------------------------------------------------
# Voice support (optional, disabled by default)
#
# Bryti does not ship a speech-to-text or text-to-speech engine. Instead, it
# can call commands you configure. Commands are argv arrays, not shell strings.
# {input} and {output} are replaced with temporary file paths.
#
# - transcribe_command reads an audio file at {input} and writes UTF-8 text to {output}
# - synthesize_command reads UTF-8 text from {input} and writes an audio file to {output}
# ---------------------------------------------------------------------------

# voice:
#   enabled: false
#   transcribe_command: ["/path/to/stt", "{input}", "--output", "{output}"]
#   synthesize_command: ["/path/to/tts", "{input}", "--output", "{output}"]
#   reply_with_voice: true
#   keep_temp_files: false
#   command_timeout_ms: 120000
#   synthesized_audio_extension: ".ogg"
#   max_tts_chars: 2500

# ---------------------------------------------------------------------------
# Optional sections (uncomment to customize)
# ---------------------------------------------------------------------------

# cron:
#   - schedule: "0 8 * * *"
