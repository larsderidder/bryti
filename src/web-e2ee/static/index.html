<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111827">
    <title>Bryti web_e2ee</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <h1>Bryti web_e2ee</h1>
      <p class="lede">Slice 4c: encrypted text roundtrip is enabled for paired devices.</p>

      <section class="card">
        <h2>Status</h2>
        <dl>
          <div>
            <dt>HTTP</dt>
            <dd id="http-status">Loading…</dd>
          </div>
          <div>
            <dt>WebSocket</dt>
            <dd id="ws-status">Disconnected</dd>
          </div>
          <div>
            <dt>Server fingerprint</dt>
            <dd id="server-fingerprint">Loading…</dd>
          </div>
          <div>
            <dt>Protocol</dt>
            <dd id="protocol-version">Loading…</dd>
          </div>
          <div>
            <dt>Pairing</dt>
            <dd id="pairing-status">Not paired</dd>
          </div>
        </dl>
      </section>

      <section class="card">
        <h2>Pair device</h2>
        <p>v1 target browser: current Chromium-based browsers.</p>
        <label>
          Device label
          <input id="device-label" type="text" placeholder="June Chromium" autocomplete="off">
        </label>
        <label>
          Invite code
          <input id="invite-code" type="text" placeholder="WEE2-7J4K-P9MX-2QRT" autocomplete="off">
        </label>
        <button id="pair-button" type="button">Pair device</button>
        <p id="pairing-message">Pairing not started.</p>
      </section>

      <section class="card">
        <h2>Chat</h2>
        <div id="chat-log" class="chat-log" aria-live="polite"></div>
        <input id="chat-input" type="text" placeholder="Pair and connect to enable encrypted outbound text" disabled>
        <button id="chat-send" type="button" disabled>Send</button>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
